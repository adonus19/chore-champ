<main class="set-password">
  <section class="set-password__card">
    <p class="eyebrow">Welcome back@if (childName()) { , {{ childName() }} }</p>
    <h1>Create your new password</h1>
    <p class="set-password__intro">
      A parent reset your sign-in. Pick a new password you'll remember, then you're all set.
    </p>

    <form class="set-password__form" (submit)="onSubmit($event); $event.preventDefault()">
      <label class="field">
        <span class="field__label required-indicator">New password</span>
        <input
          type="password"
          autocomplete="new-password"
          [formField]="passwordForm.password"
          (input)="clearError()"
          placeholder="Choose a new password"
        />
        @if (passwordForm.password().touched() && passwordForm.password().errors().length) {
          <span class="field__error">{{ errorFor(passwordForm.password().errors()) }}</span>
        }
      </label>

      <label class="field">
        <span class="field__label required-indicator">Type it again</span>
        <input
          type="password"
          autocomplete="new-password"
          [formField]="passwordForm.confirmPassword"
          (input)="clearError()"
          placeholder="Repeat the new password"
        />
        @if (passwordForm.confirmPassword().touched() && passwordForm.confirmPassword().errors().length) {
          <span class="field__error">{{ errorFor(passwordForm.confirmPassword().errors()) }}</span>
        }
      </label>

      @if (errorMessageText()) {
        <span class="field__error field__error--banner" role="alert">{{ errorMessageText() }}</span>
      }

      <button type="submit" class="primary-button" [disabled]="busy()">
        {{ busy() ? 'Saving...' : 'Save my new password' }}
      </button>
    </form>
  </section>
</main>
